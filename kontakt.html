<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt – Weiterleitung | Burchardt &amp; Kollegen</title>
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://www.burchardt-kollegen.de/kontakt/" />
    <meta http-equiv="refresh" content="0; url=https://www.burchardt-kollegen.de/kontakt/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Petrona:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bk-gold: #f7b234;
        --bk-darkblue: #3a5791;
        --bk-text: #333333;
        --bk-bg-alt: #f5f7fa;
        --bk-line: #e2e7ee;
        --bk-red: #e94e1b;
        --display: "Petrona", Georgia, serif;
        --body: "Petrona", Georgia, "Times New Roman", serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: var(--body);
        color: var(--bk-text);
        background: var(--bk-bg-alt);
        line-height: 1.6;
        padding: 24px;
      }
      .box {
        max-width: 34rem;
        text-align: center;
        background: #fff;
        border: 1px solid var(--bk-line);
        border-top: 4px solid var(--bk-gold);
        border-radius: 10px;
        padding: 40px 36px;
        box-shadow: 0 24px 60px -28px rgba(33, 49, 78, 0.35);
      }
      h1 {
        font-family: var(--display);
        color: var(--bk-darkblue);
        font-size: 1.5rem;
        margin: 0 0 12px;
      }
      p {
        margin: 0 0 22px;
        color: #4a5263;
      }
      a.btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        text-decoration: none;
        background: var(--bk-red);
        color: #fff;
        padding: 14px 26px;
        border-radius: 8px;
      }
      a.btn:hover {
        filter: brightness(0.95);
      }
    </style>
  </head>
  <body>
    <main class="box">
      <h1>Weiterleitung zum Kontakt</h1>
      <p>
        Sie werden zur Kontaktseite von Burchardt &amp; Kollegen weitergeleitet. Falls die
        Weiterleitung nicht automatisch erfolgt, nutzen Sie bitte den folgenden Link.
      </p>
      <a class="btn" href="https://www.burchardt-kollegen.de/kontakt/">Zur Kontaktseite</a>
    </main>
  </body>
</html>
